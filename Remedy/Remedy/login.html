<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Log In - Remedy</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<img src="Images/Remedy.png" alt="Remedy Logo" class="logo">

  <div class="container">

    <h2>Welcome</h2>

    <form id="login-form">

      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="email@address.com" required>

      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Enter your password" required>

      <p id="login-error" class="error-message"></p>

      <button type="submit" class="btn">Log In</button>

    </form>

    <a href="signup.html" class="med-link">Don't have an account? Sign Up</a>

  </div>

<script src="login.js"></script>
</body>
</html>
