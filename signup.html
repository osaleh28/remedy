<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up - Remedy</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <img src="Images/Remedy.png" alt="Remedy Logo" class="logo">

  <div class="container">

    <h2>Create Your Account</h2>

<form id="signup-form">

  <label for="first-name">First Name</label>
  <input type="text" id="first-name" name="first-name" placeholder="Enter your first name" required>

  <label for="last-name">Last Name</label>
  <input type="text" id="last-name" name="last-name" placeholder="Enter your last name" required>

  <label for="email">Email</label>
  <input type="email" id="email" name="email" placeholder="email@address.com" required>

  <label for="password">Password</label>
  <input type="password" id="password" name="password" placeholder="Put in Password" required>

  <label for="confirm-password">Confirm Password</label>
  <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirm Password" required>

  <p id="password-error" class="error-message"></p>

  <button type="submit" class="btn">Sign Up</button>

</form>

    <a href="index.html" class="med-link">Already have an account? Log In</a>

  </div>

<script src="script.js"></script>
</body>
</html>
